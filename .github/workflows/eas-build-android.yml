name: Build APK Android — NIAWORK AFRICA

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/swac-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN manquant"
            exit 1
          fi
          echo "EXPO_TOKEN présent"

      - name: Verify EAS auth
        working-directory: artifacts/swac-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Build APK Android
        working-directory: artifacts/swac-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive
